name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          find scripts -name "*.sh" | xargs shellcheck --severity=warning

  e2e:
    name: E2E Pipeline (eds)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Checkout edgesentry-rs
        uses: actions/checkout@v4
        with:
          repository: edgesentry/edgesentry-rs
          path: edgesentry-rs

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Build eds
        run: cargo build -p eds
        working-directory: edgesentry-rs

      - name: Add eds to PATH
        run: echo "${{ github.workspace }}/edgesentry-rs/target/debug" >> $GITHUB_PATH

      - name: Run e2e (no LLM)
        run: bash scripts/test-e2e.sh --no-pause --no-explain
