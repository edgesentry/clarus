name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: shellcheck
        run: |
          find scripts -name "*.sh" | xargs shellcheck --severity=warning

  e2e:
    name: E2E Pipeline (eds)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkout edgesentry-rs (matching branch or main)
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if git clone --branch "$BRANCH" --depth 1 \
              https://github.com/edgesentry/edgesentry-rs.git edgesentry-rs 2>/dev/null; then
            echo "edgesentry-rs: checked out $BRANCH"
          else
            git clone --depth 1 \
              https://github.com/edgesentry/edgesentry-rs.git edgesentry-rs
            echo "edgesentry-rs: fell back to default branch"
          fi

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Build eds
        run: cargo build -p eds
        working-directory: edgesentry-rs

      - name: Add eds to PATH
        run: echo "${{ github.workspace }}/edgesentry-rs/target/debug" >> $GITHUB_PATH

      - name: Run e2e (no LLM)
        run: bash scripts/test-e2e.sh --no-pause --no-explain
