[graph]
targets = []

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# Vulnerabilities are denied by default in v2. Add ignores here if a transitive
# dep has an unfixable advisory with no exploitable call-site in this codebase.

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[licenses]
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  # ISC: permissive, OSI/FSF-approved, functionally equivalent to MIT.
  # Used by: ring, rustls-webpki, untrusted (via edgesentry-audit → ed25519-dalek).
  "ISC",
  # MIT-0: MIT with attribution clause removed.
  "MIT-0",
  # CDLA-Permissive-2.0: permissive, attribution-only, no copyleft.
  # Used by: webpki-roots (via ureq → rustls-webpki).
  "CDLA-Permissive-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
